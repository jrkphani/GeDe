name: verify

# Runs the full gate (typecheck → eslint → stylelint → vitest → playwright) on
# every PR and on pushes to main. Deploy (TECH_STACK §6.4 / OIDC) is a separate,
# still-deferred workflow — this one is verify-only, so it is unblocked.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run verify
