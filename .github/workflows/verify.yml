name: verify

# Runs the full gate (typecheck → eslint → stylelint → vitest → playwright) on
# every PR and on pushes to main. Deploy (TECH_STACK §6.4 / OIDC) is a separate,
# still-deferred workflow — this one is verify-only, so it is unblocked.
on:
  push:
    branches: [main]
  pull_request:

# onnxruntime-node (via @huggingface/transformers, issue 042) postinstall
# downloads large CUDA/GPU EP binaries from nuget.org during `npm ci`; that
# host is intermittently unreachable from CI runners (ETIMEDOUT). The app uses
# onnxruntime-web (WASM), never the native Node backend, so skip the
# non-bundled binary download. See onnxruntime-node/script/install.js.
env:
  ONNXRUNTIME_NODE_INSTALL: skip

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run verify
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
